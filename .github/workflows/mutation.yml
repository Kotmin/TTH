name: Mutation Tests

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mutation:
    name: PIT mutation analysis
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run mutation tests
        run: ./gradlew pitest --no-daemon

      - name: Save report to repository
        if: always()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SAFE_BRANCH="${BRANCH//\//-}"
          DATE="$(date +%Y-%m-%d)"
          cp -r build/reports/pitest "docs/mutation/report_${DATE}_${SAFE_BRANCH}"
          git config user.name "Kotmin"
          git config user.email "groovy.tech.cat@gmail.com"
          git stash
          git pull --rebase origin "${BRANCH}"
          git stash pop || true
          git add "docs/mutation/"
          git commit -m "docs(mutation): add PIT report ${DATE} ${SAFE_BRANCH}" || echo "nothing to commit"
          git push origin HEAD:"${BRANCH}"

      - name: Upload PIT report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pitest-report
          path: build/reports/pitest/
          retention-days: 14
